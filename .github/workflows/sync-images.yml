name: Sync Cloudinary Images

on:
  schedule:
    # Runs every Wednesday at 3:00 AM UTC (adjust timezone as needed)
    - cron: '0 3 * * 3'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write

concurrency:
  group: sync-cloudinary-images
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Update local branch from origin
        run: |
          set -euo pipefail
          BR="${GITHUB_REF_NAME:-main}"
          git fetch origin "$BR"
          git checkout -B "$BR" "origin/$BR"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./portfolio-website
        run: npm install

      - name: Sync images from Cloudinary
        working-directory: ./portfolio-website
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: npm run sync-images

      - name: Commit and push if changed
        id: sync_commit
        run: |
          set -euo pipefail
          # Use the repo owner so Vercel/Git deploys are not attributed to
          # actions@github.com (not a Vercel team member → deploy may be blocked).
          git config user.name "${{ github.repository_owner }}"
          git config user.email "${{ github.repository_owner }}@users.noreply.github.com"
          TARGET_BRANCH="${GITHUB_REF_NAME:-main}"

          echo "pushed=false" >> "$GITHUB_OUTPUT"

          git add portfolio-website/public/images-data.json
          if git diff --quiet && git diff --staged --quiet; then
            echo "No image list changes."
            exit 0
          fi

          git commit -m "chore(sync): update Cloudinary images-data.json"
          git fetch origin "$TARGET_BRANCH"
          git pull --rebase origin "$TARGET_BRANCH"
          git push origin "HEAD:${TARGET_BRANCH}"
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      # VERCEL_TOKEN must be created at vercel.com/account/tokens while logged in
      # as a member of the team that owns this project (not actions@github.com).
      # VERCEL_ORG_ID + VERCEL_PROJECT_ID: from .vercel/project.json after `vercel link`
      # inside portfolio-website (or Vercel Dashboard → Project → Settings → General).
      - name: Deploy to Vercel Production
        if: success() && (steps.sync_commit.outputs.pushed == 'true' || github.event_name == 'workflow_dispatch')
        working-directory: ./portfolio-website
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          npx --yes vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN"

